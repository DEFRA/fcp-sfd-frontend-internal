version: 2

updates:
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "chore"
    open-pull-requests-limit: 5
    groups:
      third-party-images:
        patterns:
          - "localstack/*"
      exclude-local:
        exclude-patterns:
          - "fcp-sfd-frontend-internal*"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "chore"
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    groups:
      core-actions:
        patterns:
          - "actions/*"
      defra-actions:
        patterns:
          - "DEFRA/*"
